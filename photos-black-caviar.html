<script>
const photoSets = {
  all: ["https://swanpass.com/wp-content/uploads/2023/02/117340287_862419104286628_6620771948639718998_n-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/2020-08-23.jpg", "https://swanpass.com/wp-content/uploads/2023/02/312092155_1387974095064457_2862644579662084659_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/download-1-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/download-3.jpg", "https://swanpass.com/wp-content/uploads/2023/02/maxresdefault-2.jpg", "https://swanpass.com/wp-content/uploads/2023/02/117188388_862418680953337_1411237828200760874_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/117202647_862419080953297_2663276030018179980_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/117340287_862419104286628_6620771948639718998_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/117535630_862418370953368_7470473212693129484_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/c34054f78610018f4545622a3a5edb4e1_47627407_200205_0009.webp", "https://swanpass.com/wp-content/uploads/2023/02/hq720.jpg", "https://swanpass.com/wp-content/uploads/2023/02/103_509819212.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Screenshot-2023-02-15-at-1.06.39-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Screenshot-2023-02-15-at-1.06.43-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/02/shop_shop_photo_cover_9940_1666240452.jpg", "https://swanpass.com/wp-content/uploads/2023/02/download-26.webp", "https://swanpass.com/wp-content/uploads/2023/02/download-38.webp", "https://swanpass.com/wp-content/uploads/2023/02/v2-5ded4ac099d89836000ffa45f7c644bf_1440w.webp"],
  talent: ["https://swanpass.com/wp-content/uploads/2023/02/2020-08-23.jpg", "https://swanpass.com/wp-content/uploads/2023/02/312092155_1387974095064457_2862644579662084659_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/download-1-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/download-3.jpg", "https://swanpass.com/wp-content/uploads/2023/02/maxresdefault-2.jpg", "https://swanpass.com/wp-content/uploads/2023/02/117188388_862418680953337_1411237828200760874_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/117202647_862419080953297_2663276030018179980_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/117340287_862419104286628_6620771948639718998_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/117535630_862418370953368_7470473212693129484_n.jpg"],
  shop: ["https://swanpass.com/wp-content/uploads/2023/02/117340287_862419104286628_6620771948639718998_n-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/c34054f78610018f4545622a3a5edb4e1_47627407_200205_0009.webp", "https://swanpass.com/wp-content/uploads/2023/02/hq720.jpg", "https://swanpass.com/wp-content/uploads/2023/02/103_509819212.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Screenshot-2023-02-15-at-1.06.39-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Screenshot-2023-02-15-at-1.06.43-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/02/shop_shop_photo_cover_9940_1666240452.jpg", "https://swanpass.com/wp-content/uploads/2023/02/download-26.webp", "https://swanpass.com/wp-content/uploads/2023/02/download-38.webp", "https://swanpass.com/wp-content/uploads/2023/02/v2-5ded4ac099d89836000ffa45f7c644bf_1440w.webp"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

(function() {
  let startX = 0;
  const img = document.getElementById('lightboxImg');
  img.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
  img.addEventListener('touchend', function(e) {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) navLightbox(diff > 0 ? -1 : 1);
  });
})();
</script>
