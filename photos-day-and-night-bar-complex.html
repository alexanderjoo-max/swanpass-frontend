<script>
const photoSets = {
  all: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2987/Udon-Thani-Girly-Bars-1200.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2975/girls-udon-thani.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2976/images.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2978/hq720.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2977/nightlife-in-udon-thani-cover-img.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2980/singles-nightlife-udon-thani-hook-up-girls-online-one-night-650x409.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2979/isaan_girl_party_meet_girls_udon_thani.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2981/udon_thani_girls.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2982/Udon-Thani-Girl.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2983/Udon-Thani-Ladyboy-500.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2984/6752421.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2985/8888637_orig.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2986/0ww6812000952tpps44B7.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2987/Udon-Thani-Girly-Bars-1200.jpg"],
  talent: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2975/girls-udon-thani.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2976/images.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2978/hq720.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2977/nightlife-in-udon-thani-cover-img.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2980/singles-nightlife-udon-thani-hook-up-girls-online-one-night-650x409.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2979/isaan_girl_party_meet_girls_udon_thani.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2981/udon_thani_girls.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2982/Udon-Thani-Girl.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2983/Udon-Thani-Ladyboy-500.jpg"],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2987/Udon-Thani-Girly-Bars-1200.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2984/6752421.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2985/8888637_orig.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2986/0ww6812000952tpps44B7.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2987/Udon-Thani-Girly-Bars-1200.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
