<script>
const photoSets = {
  all: ["https://swanpass.com/wp-content/uploads/2023/02/1142961_SbSEaN9PjaPNJdX1IgsAN0blLupKwZ3URGVajbI6rkM-600x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/317058554_545844896957012_9085499813113521925_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/321010869_1161884434431041_4407677833083132229_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/321080091_1347317999413887_5883403635392208803_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/321864403_1169761910330427_6553457289619262212_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/324410449_104834642470186_8819153216866781556_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/325189886_882872059830494_3251631319141425826_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/325300257_627553605791651_10291392620061345_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/328258999_1113548449342289_5441340657627447608_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330727747_592997562271671_4544763753065637829_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/1142961_SbSEaN9PjaPNJdX1IgsAN0blLupKwZ3URGVajbI6rkM.jpg", "https://swanpass.com/wp-content/uploads/2023/02/large_vip_room_dubai_luxury_club.webp", "https://swanpass.com/wp-content/uploads/2023/02/large_private_room_dubai_luxury_club.jpg", "https://swanpass.com/wp-content/uploads/2023/02/200110_0067-1024x683-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/323890247_5806190902793515_5826125761921449925_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/325209814_1997713807092534_2394571428471177003_n.jpg"],
  talent: ["https://swanpass.com/wp-content/uploads/2023/02/317058554_545844896957012_9085499813113521925_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/321010869_1161884434431041_4407677833083132229_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/321080091_1347317999413887_5883403635392208803_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/321864403_1169761910330427_6553457289619262212_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/324410449_104834642470186_8819153216866781556_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/325189886_882872059830494_3251631319141425826_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/325300257_627553605791651_10291392620061345_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/328258999_1113548449342289_5441340657627447608_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330727747_592997562271671_4544763753065637829_n.jpg"],
  shop: ["https://swanpass.com/wp-content/uploads/2023/02/1142961_SbSEaN9PjaPNJdX1IgsAN0blLupKwZ3URGVajbI6rkM-600x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/1142961_SbSEaN9PjaPNJdX1IgsAN0blLupKwZ3URGVajbI6rkM.jpg", "https://swanpass.com/wp-content/uploads/2023/02/large_vip_room_dubai_luxury_club.webp", "https://swanpass.com/wp-content/uploads/2023/02/large_private_room_dubai_luxury_club.jpg", "https://swanpass.com/wp-content/uploads/2023/02/200110_0067-1024x683-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/323890247_5806190902793515_5826125761921449925_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/325209814_1997713807092534_2394571428471177003_n.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

(function() {
  let startX = 0;
  const img = document.getElementById('lightboxImg');
  img.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
  img.addEventListener('touchend', function(e) {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) navLightbox(diff > 0 ? -1 : 1);
  });
})();
</script>
