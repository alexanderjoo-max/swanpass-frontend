rod/uploads/photo/image/6360/MdHb316728.jpg"],
  talent: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6361/d0WvmxP.md.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6362/d0WejND-1.md.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6363/d0SDyfq.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6364/d0Ya3h1.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6365/d0SlAVv.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6366/d0YaUER.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6367/d0YXFol.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6369/d0YIelZ.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6368/d04ginn.md.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6370/d0YXa50.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6371/ddokZVb.md.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6372/d07wH2Z.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6373/GOtl605264.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6374/iFvm601325-1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6376/iFvm601325.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6375/Screenshot_2023-11-19_at_6.33.24_PM.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6377/Screenshot_2023-11-19_at_6.33.12_PM.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6378/Screenshot_2023-11-19_at_6.33.39_PM.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6379/Screenshot_2023-11-19_at_6.33.33_PM.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6380/sz8A611666.jpg"],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6360/MdHb316728.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6358/dWdiobk.md.gif","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6359/dWdiP4E.md.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/6360/MdHb316728.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
