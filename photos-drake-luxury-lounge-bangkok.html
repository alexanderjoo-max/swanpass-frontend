const photoSets = {
  all: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15250/WhatsApp_Image_2026-02-23_at_16.12.33.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15238/5eb6f24a-7bc2-4d66-acfd-064eeebf057c.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15239/90c92fbf-15b3-40ec-b456-dc5cc06092ce.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15237/5132ebf8-197c-4a16-b912-c8ad4bace25d.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15241/a8bd2c10-0337-42d5-a31d-1cb08607f6d8.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15240/e8d10af6-eaa0-42f9-9dfa-9963359faebd.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15242/IMAGE_2026-02-23_16_22_49.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15243/IMAGE_2026-02-23_16_22_53.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15246/fe04b952-a7aa-46f0-8344-9b9d63c6d9b5.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15245/IMAGE_2026-02-23_16_22_56.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15244/%E1%84%83%E1%85%A1%E1%84%8B%E1%85%AE%E1%86%AB%E1%84%85%E1%85%A9%E1%84%83%E1%85%B3-15.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15247/photo_2026-02-16_19-39-54-2.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15248/IMAGE_2026-02-23_16_22_43.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15249/IMAGE_2026-02-23_16_22_55.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15251/2026-02-25_17.13.11.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15252/2026-02-25_17.12.56.jpg"],
  talent: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15238/5eb6f24a-7bc2-4d66-acfd-064eeebf057c.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15239/90c92fbf-15b3-40ec-b456-dc5cc06092ce.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15237/5132ebf8-197c-4a16-b912-c8ad4bace25d.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15241/a8bd2c10-0337-42d5-a31d-1cb08607f6d8.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15240/e8d10af6-eaa0-42f9-9dfa-9963359faebd.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15242/IMAGE_2026-02-23_16_22_49.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15243/IMAGE_2026-02-23_16_22_53.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15246/fe04b952-a7aa-46f0-8344-9b9d63c6d9b5.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15245/IMAGE_2026-02-23_16_22_56.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15244/%E1%84%83%E1%85%A1%E1%84%8B%E1%85%AE%E1%86%AB%E1%84%85%E1%85%A9%E1%84%83%E1%85%B3-15.jpg"],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15250/WhatsApp_Image_2026-02-23_at_16.12.33.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15247/photo_2026-02-16_19-39-54-2.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15248/IMAGE_2026-02-23_16_22_43.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15249/IMAGE_2026-02-23_16_22_55.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15251/2026-02-25_17.13.11.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15252/2026-02-25_17.12.56.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
