<script>
const photoSets = {
  all: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3013/1681724069320.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3001/329019321_1420363698774120_4768618937596971794_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3002/82dee2928.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3003/000162958.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3004/8330f%E0%B8%A1%E0%B8%B4%E0%B9%80%E0%B8%8A%E0%B8%A5123.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3005/6b368%E0%B8%A1%E0%B8%B4%E0%B9%80%E0%B8%8A%E0%B8%A5.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3006/330604700_765469274689258_8931738076556567329_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3007/d68a22385.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3008/330552180_896909051358117_2649951037600057151_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3009/c9a042651.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3010/images.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3011/333628979_563364872427362_6705565195951277208_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3012/IMG_7156.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3013/1681724069320.jpg"],
  talent: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3001/329019321_1420363698774120_4768618937596971794_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3002/82dee2928.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3003/000162958.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3004/8330f%E0%B8%A1%E0%B8%B4%E0%B9%80%E0%B8%8A%E0%B8%A5123.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3005/6b368%E0%B8%A1%E0%B8%B4%E0%B9%80%E0%B8%8A%E0%B8%A5.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3006/330604700_765469274689258_8931738076556567329_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3007/d68a22385.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3008/330552180_896909051358117_2649951037600057151_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3009/c9a042651.jpg"],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3013/1681724069320.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3010/images.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3011/333628979_563364872427362_6705565195951277208_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3012/IMG_7156.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/3013/1681724069320.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
