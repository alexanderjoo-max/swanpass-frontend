<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos — JSpot — Swanpass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/site.css">
</head>
<body>

<div data-include="partials/header.html"></div>

<div class="photos-header">
  <a href="listing-jspot-bangkok.html" class="photos-back">←</a>
  <div class="photos-title">Photos for JSpot</div>
</div>

<div class="photos-tab-bar">
  <button class="photos-tab active" onclick="filterPhotos('all', this)">All<span class="photos-count">6</span></button>
  <button class="photos-tab" onclick="filterPhotos('talent', this)">Talents<span class="photos-count">4</span></button>
  <button class="photos-tab" onclick="filterPhotos('shop', this)">Interior/Exterior<span class="photos-count">2</span></button>
</div>

<div class="photos-grid" id="photosGrid">
  <div class="photo-thumb" data-cat="featured" onclick="openLightbox(0, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14639/S__6889528.jpg" alt="JSpot" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(1, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14640/DT43xi0ELeI5cU6dFGU2YxFhLLOrczEQvq4PgSrJJoc5FCGHJED9vx0PQix23meh2cyqw4ypETFmbyyZwShiyw.webp" alt="JSpot" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(2, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14641/d65b421e54d0b22ed04caa1a417e09ff_vZSfcedU_9988f7c85e499f6b44b09c2a2bc5b32e843ce34e.png" alt="JSpot" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(3, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14642/thumb-d65b421e54d0b22ed04caa1a417e09ff_pwt2GUWr_90ed892a44d72de74753869c2b737b3798756b52_600x644.png" alt="JSpot" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(4, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14643/d65b421e54d0b22ed04caa1a417e09ff_ksY9pwfR_eb539db004a3b0d152aa5d464821e53340daeb11.png" alt="JSpot" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="shop" onclick="openLightbox(5, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14644/S__6889526.jpg" alt="JSpot" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">›</button>
</div>

<div data-include="partials/footer.html"></div>

<script src="js/include.js"></script>
<script>
const photoSets = {
  all: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14639/S__6889528.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14640/DT43xi0ELeI5cU6dFGU2YxFhLLOrczEQvq4PgSrJJoc5FCGHJED9vx0PQix23meh2cyqw4ypETFmbyyZwShiyw.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14641/d65b421e54d0b22ed04caa1a417e09ff_vZSfcedU_9988f7c85e499f6b44b09c2a2bc5b32e843ce34e.png","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14642/thumb-d65b421e54d0b22ed04caa1a417e09ff_pwt2GUWr_90ed892a44d72de74753869c2b737b3798756b52_600x644.png","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14643/d65b421e54d0b22ed04caa1a417e09ff_ksY9pwfR_eb539db004a3b0d152aa5d464821e53340daeb11.png","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14644/S__6889526.jpg"],
  talent: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14640/DT43xi0ELeI5cU6dFGU2YxFhLLOrczEQvq4PgSrJJoc5FCGHJED9vx0PQix23meh2cyqw4ypETFmbyyZwShiyw.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14641/d65b421e54d0b22ed04caa1a417e09ff_vZSfcedU_9988f7c85e499f6b44b09c2a2bc5b32e843ce34e.png","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14642/thumb-d65b421e54d0b22ed04caa1a417e09ff_pwt2GUWr_90ed892a44d72de74753869c2b737b3798756b52_600x644.png","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14643/d65b421e54d0b22ed04caa1a417e09ff_ksY9pwfR_eb539db004a3b0d152aa5d464821e53340daeb11.png"],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14639/S__6889528.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14644/S__6889526.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
</body>
</html>
