<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">›</button>
</div>

<div data-include="partials/footer.html"></div>

<script src="js/include.js"></script>
<script>
const photoSets = {
  all: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2301/chiang-mai-lover-spa-19405.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2292/chiang-mai-lover-spa-18638.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2293/chiang-mai-lover-spa-18639.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2295/chiang-mai-lover-spa-18647.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2294/chiang-mai-lover-spa-18646.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2296/a%CC%80__a%CC%80_%C2%B5a%CC%80__a%CC%80__a%CC%80_%C2%AA3.png","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2298/Loverspa-girl.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2297/Loverspa-chiang-mai-1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2299/Loverspa-photo.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2300/Loverspa.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2302/chiang-mai-lover-spa-18637.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2301/chiang-mai-lover-spa-19405.jpg"],
  talent: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2292/chiang-mai-lover-spa-18638.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2293/chiang-mai-lover-spa-18639.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2295/chiang-mai-lover-spa-18647.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2294/chiang-mai-lover-spa-18646.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2296/a%CC%80__a%CC%80_%C2%B5a%CC%80__a%CC%80__a%CC%80_%C2%AA3.png","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2298/Loverspa-girl.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2297/Loverspa-chiang-mai-1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2299/Loverspa-photo.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2300/Loverspa.jpg"],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2301/chiang-mai-lover-spa-19405.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2302/chiang-mai-lover-spa-18637.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2301/chiang-mai-lover-spa-19405.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
</body>
</html>
