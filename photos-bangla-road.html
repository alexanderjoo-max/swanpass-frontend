<script src="js/include.js"></script>
<script>
const photoSets = {
  all: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4278/bangla-walking-street-patong-beach-phuket.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4272/6243036f15567f0019c04d21.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4274/A-Complete-Guide-to-Bangla-Road-in-Phuket-1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4275/327c93d2-7945-4433-96f8-5b4bdea04ac7.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4273/2186fad7-f899-4bec-9652-cdf07a55859c.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4276/9967b73d-6c88-4265-a3fb-dcf5b59d87b4.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4277/map_Bangla_Road.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4278/bangla-walking-street-patong-beach-phuket.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4279/bangla_road_patong.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4280/ad6df585813767.5d8777f5c3701.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4281/maxresdefault.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4282/msid-53719491_width-96_height-65.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4283/tiger-night-club-phuket-7b24.jpg"],
  talent: [],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4278/bangla-walking-street-patong-beach-phuket.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4272/6243036f15567f0019c04d21.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4274/A-Complete-Guide-to-Bangla-Road-in-Phuket-1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4275/327c93d2-7945-4433-96f8-5b4bdea04ac7.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4273/2186fad7-f899-4bec-9652-cdf07a55859c.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4276/9967b73d-6c88-4265-a3fb-dcf5b59d87b4.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4277/map_Bangla_Road.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4278/bangla-walking-street-patong-beach-phuket.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4279/bangla_road_patong.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4280/ad6df585813767.5d8777f5c3701.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4281/maxresdefault.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4282/msid-53719491_width-96_height-65.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/4283/tiger-night-club-phuket-7b24.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
