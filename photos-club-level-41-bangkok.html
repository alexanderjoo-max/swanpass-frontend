  talent: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13767/kang1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13768/fang1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13769/jae1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13770/may1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13773/nab1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13771/minnie1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13772/mint1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13774/ning1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13775/rose1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13776/sry1.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13782/s-8.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13782/s-8.webp"],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13781/d6f2d3ba1d6e60e87c14102934a1db12.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13779/store01.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13780/room02.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13778/room03.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13777/room01.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13784/s-S__48832561.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13786/s-9.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13785/c85fea0c2a2325fd9f1e2cc8b953dee1.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/13783/s-S__48832559.webp"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
