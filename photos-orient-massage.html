<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">&#10005;</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">&lsaquo;</button>

<div class="bn-spacer"></div>
<script src="js/bottom-nav.js"></script>
<script>
const photoSets = {
  all: ["https://swanpass.com/wp-content/uploads/2023/02/08-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Bell-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Cake.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Ice.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Mai-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Meji-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Name-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Name-2.jpg", "https://swanpass.com/wp-content/uploads/2023/02/On.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Ploy.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Pope.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Soda.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Tan.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Tey.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Yuy.jpg", "https://swanpass.com/wp-content/uploads/2023/02/ten_00.jpg", "https://swanpass.com/wp-content/uploads/2023/02/15.jpg", "https://swanpass.com/wp-content/uploads/2023/02/14.jpg", "https://swanpass.com/wp-content/uploads/2023/02/10.jpg", "https://swanpass.com/wp-content/uploads/2023/02/08.jpg", "https://swanpass.com/wp-content/uploads/2023/02/03.jpg", "https://swanpass.com/wp-content/uploads/2023/02/02.jpg"],
  talent: ["https://swanpass.com/wp-content/uploads/2023/02/Bell-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Cake.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Ice.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Mai-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Meji-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Name-1.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Name-2.jpg", "https://swanpass.com/wp-content/uploads/2023/02/On.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Ploy.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Pope.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Soda.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Tan.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Tey.jpg", "https://swanpass.com/wp-content/uploads/2023/02/Yuy.jpg"],
  shop: ["https://swanpass.com/wp-content/uploads/2023/02/08-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/ten_00.jpg", "https://swanpass.com/wp-content/uploads/2023/02/15.jpg", "https://swanpass.com/wp-content/uploads/2023/02/14.jpg", "https://swanpass.com/wp-content/uploads/2023/02/10.jpg", "https://swanpass.com/wp-content/uploads/2023/02/08.jpg", "https://swanpass.com/wp-content/uploads/2023/02/03.jpg", "https://swanpass.com/wp-content/uploads/2023/02/02.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

(function() {
  let startX = 0;
  const img = document.getElementById('lightboxImg');
  img.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
  img.addEventListener('touchend', function(e) {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) navLightbox(diff > 0 ? -1 : 1);
  });
})();
</script>
