<style>
:root{--black:#0a0a0a;--black2:#111111;--card-bg:#161616;--red:#e8142a;--red-dark:#b80f20;--white:#fff;--white70:rgba(255,255,255,.7);--white40:rgba(255,255,255,.4);--white10:rgba(255,255,255,.08);--gold:#d4a847;--green:#22c55e;--border:rgba(255,255,255,.08);--radius:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
header{flex-shrink:0;}
.nav-tabs{flex-shrink:0;}

.map-filters{background:var(--black2);border-bottom:1px solid var(--border);padding:8px 16px;flex-shrink:0;display:flex;flex-direction:row;gap:8px;overflow-x:auto;scrollbar-width:none;align-items:center;-webkit-overflow-scrolling:touch;max-width:100vw;}
.map-filters::-webkit-scrollbar{display:none;}
.filter-pill{display:flex;align-items:center;gap:4px;background:var(--white10);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .2s;flex-shrink:0;color:var(--white70);}
.filter-pill:hover,.filter-pill.active{background:var(--red);border-color:var(--red);color:var(--white);}
.filter-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.filter-search{display:flex;align-items:center;gap:6px;background:var(--white10);border:1px solid var(--border);border-radius:20px;padding:5px 12px;flex-shrink:0;position:relative;}
.filter-search input{background:none;border:none;outline:none;color:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;width:130px;}
.filter-search input::placeholder{color:var(--white40);}
.main{flex:1;display:flex;overflow:hidden;position:relative;z-index:0;}
#map{flex:1;}
.leaflet-container{background:#1a1a1a!important;}
.emoji-pin{font-size:24px;cursor:pointer;filter:drop-shadow(0 2px 6px rgba(0,0,0,.9));transition:transform .15s;line-height:1;display:block;}
.emoji-pin:hover{transform:scale(1.35);}
.sidebar{width:300px;flex-shrink:0;background:var(--black2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sidebar-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;}
.result-count{font-size:11px;color:var(--white40);}
.sidebar-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.list-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;gap:10px;align-items:flex-start;}
.list-item:hover{background:var(--white10);}
.list-item.active{background:rgba(232,20,42,.1);border-left:3px solid var(--red);}
.list-thumb{width:50px;height:50px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--black);}
.list-info{flex:1;min-width:0;}
.list-name{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-meta{font-size:10px;color:var(--white40);margin-bottom:3px;}
.list-footer{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.list-rating{font-size:10px;font-weight:600;color:var(--gold);}
.list-visits{font-size:9px;color:var(--white40);background:var(--white10);padding:1px 5px;border-radius:8px;}
.badge{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.badge-sponsored{background:linear-gradient(135deg,#d4a847,#f5d784,#d4a847);color:#1a1000;text-shadow:0 1px 0 rgba(255,255,255,.25);box-shadow:0 1px 4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.3);}
.badge-deal{background:rgba(34,197,94,.9);color:#000;}
.badge-new{background:rgba(99,102,241,.9);color:#fff;}
.badge-verified{background:rgba(59,130,246,.92);color:#fff;}
/* Popup overlay on pin click */
.map-popup{position:absolute;z-index:500;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:300px;display:none;pointer-events:none;}
.map-popup.show{display:block;pointer-events:auto;}
.popup-card{background:var(--black2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.8);position:relative;}
.popup-img{width:100%;height:120px;object-fit:cover;display:block;}
.popup-img-overlay{position:absolute;top:0;left:0;right:0;height:120px;display:flex;align-items:flex-start;justify-content:flex-end;gap:6px;padding:8px;}
.popup-close{background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border:none;border-radius:50%;width:32px;height:32px;color:var(--white);cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .2s;line-height:1;}.popup-close:hover{background:var(--red);}
.popup-heart{background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border:none;border-radius:50%;width:32px;height:32px;color:var(--white);cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1;}.popup-heart:hover,.popup-heart.saved{background:var(--red);color:#fff;}
.popup-body{padding:10px 12px 12px;}
.popup-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.popup-meta{font-size:11px;color:var(--white40);margin-bottom:8px;}
.popup-stats{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.popup-rating{font-size:12px;font-weight:700;color:var(--gold);}
.popup-visits{font-size:11px;color:var(--white40);}
.popup-badges{display:flex;gap:4px;flex:1;justify-content:flex-end;}
.popup-actions{display:flex;gap:8px;}
.btn-view{flex:1;background:var(--red);color:var(--white);border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;text-decoration:none;display:block;}
/* Bottom scrollable card panel (mobile) */
.map-cards-panel{position:fixed;bottom:56px;left:0;right:0;z-index:400;display:flex;gap:10px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;background:linear-gradient(0deg,rgba(10,10,10,.95) 0%,rgba(10,10,10,.75) 80%,transparent 100%);}
.map-cards-panel::-webkit-scrollbar{display:none;}
.map-card{flex-shrink:0;width:220px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;gap:0;text-decoration:none;color:inherit;transition:border-color .2s;cursor:pointer;}
.map-card:hover,.map-card.active{border-color:var(--red);}
.map-card-img{width:72px;height:72px;object-fit:cover;flex-shrink:0;background:#2a1a1a;}
.map-card-body{padding:8px 10px;flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.map-card-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.map-card-meta{font-size:10px;color:var(--white40);margin-bottom:3px;}
.map-card-foot{display:flex;align-items:center;gap:6px;}
.map-card-rating{font-size:10px;font-weight:700;color:var(--gold);}
.map-card-visits{font-size:9px;color:var(--white40);}
@media(min-width:768px){
  .map-cards-panel{display:none!important;}
}
@media(max-width:767px){
  .sidebar{display:none;}
  .map-popup{bottom:148px;width:calc(100% - 24px);}
  .map-filters{padding:8px 12px;}
}
</style>

<script>
(function(){
  var page = location.pathname.split('/').pop() || 'index.html';
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) {
    var href = tabs[i].getAttribute('href');
    if (href === page || (page === '' && href === 'index.html')) tabs[i].classList.add('active');
    if (page.indexOf('city-') === 0 && href === 'cities.html') tabs[i].classList.add('active');
    if (page.indexOf('listing-') === 0 && href === 'search.html') tabs[i].classList.add('active');
  }
  var hLinks = document.querySelectorAll('.header-nav a');
  for (var j = 0; j < hLinks.length; j++) {
    var h = hLinks[j].getAttribute('href');
    if (h === page || (page === '' && h === 'index.html')) hLinks[j].classList.add('active');
    if (page.indexOf('city-') === 0 && h === 'cities.html') hLinks[j].classList.add('active');
    if (page.indexOf('listing-') === 0 && h === 'search.html') hLinks[j].classList.add('active');
  }
  var nav = document.querySelector('.nav-tabs');
  var btn = document.querySelector('.btn-hamburger');
  tabs.forEach(function(t){
    t.addEventListener('click', function(){
      nav.classList.remove('open');
      if(btn) btn.textContent = '\u2630';
    });
  });
})();
</script>

let activeCat='all',activeTags=new Set(),activeItem=null,markers=[];
const map=L.map('map',{center:[13.73,100.56],zoom:13,zoomControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

function vCheck(tags){
  if(!tags||!tags.includes('verified'))return '';
  return '<span class="v-check"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>';
}

function mkIcon(emoji,active){
  return L.divIcon({html:`<span class="emoji-pin" style="${active?'transform:scale(1.4);filter:drop-shadow(0 0 8px rgba(232,20,42,.9));':''}">${emoji}</span>`,iconSize:[32,32],iconAnchor:[16,16],className:''});
}

function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m.layer));markers=[];
  const list=document.getElementById('sidebarList');list.innerHTML='';
  const panel=document.getElementById('mapCardsPanel');panel.innerHTML='';
  const q=document.getElementById('searchInput').value.toLowerCase();
  let count=0;
  shops.forEach(s=>{
    if(activeCat!=='all'&&s.cat!==activeCat)return;
    if(activeTags.size>0&&![...activeTags].every(t=>s.tags.includes(t)))return;
    if(q&&!s.name.toLowerCase().includes(q)&&!s.city.toLowerCase().includes(q))return;
    count++;
    const m=L.marker([s.lat,s.lng],{icon:mkIcon(s.emoji,false)}).addTo(map);
    m.on('click',()=>showPopup(s,m));
    markers.push({layer:m,shop:s});
    // Sidebar item (desktop)
    const div=document.createElement('div');
    div.className='list-item';div.id='li-'+s.id;
    div.innerHTML=`<img class="list-thumb" src="${s.img}" onerror="this.style.background='#2a1a1a';this.removeAttribute('src')">
    <div class="list-info">
      <div class="list-name">${s.name}${vCheck(s.tags)}</div>
      <div class="list-meta">${s.emoji} ${s.cat} · 📍 ${s.city}</div>
      <div class="list-footer">
        <span class="list-rating">★ ${s.rating}</span>
        <span class="list-visits">${s.visits}</span>
        ${s.tags.includes('verified')?'<span class="badge badge-verified">✓ Verified</span>':''}
        ${s.tags.includes('sponsored')?'<span class="badge badge-sponsored">★ Featured</span>':''}
        ${s.tags.includes('deal')?'<span class="badge badge-deal">Deal</span>':''}
        ${s.tags.includes('new')?'<span class="badge badge-new">New</span>':''}
      </div>
    </div>`;
    div.onclick=()=>{map.setView([s.lat,s.lng],16);showPopup(s,m);};
    list.appendChild(div);
    // Bottom card (mobile)
    const card=document.createElement('a');
    card.className='map-card';card.id='mc-'+s.id;card.href='javascript:void(0)';
    card.innerHTML=`<img class="map-card-img" src="${s.img}" onerror="this.style.background='#2a1a1a';this.removeAttribute('src')">
    <div class="map-card-body">
      <div class="map-card-name">${s.name}${vCheck(s.tags)}</div>
      <div class="map-card-meta">${s.emoji} ${s.cat} · ${s.city}</div>
      <div class="map-card-foot">
        <span class="map-card-rating">★ ${s.rating}</span>
        <span class="map-card-visits">${s.visits} visits</span>
      </div>
    </div>`;
    card.onclick=(e)=>{e.preventDefault();map.setView([s.lat,s.lng],16);showPopup(s,m);scrollCardIntoView(s.id);};
    panel.appendChild(card);
  });
  document.getElementById('resultCount').textContent=count+' results';
}
function scrollCardIntoView(id){
  const card=document.getElementById('mc-'+id);
  if(card) card.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function showPopup(s,marker){
  if(activeItem){
    activeItem.layer.setIcon(mkIcon(activeItem.shop.emoji,false));
    document.getElementById('li-'+activeItem.shop.id)?.classList.remove('active');
    document.getElementById('mc-'+activeItem.shop.id)?.classList.remove('active');
  }
  marker.setIcon(mkIcon(s.emoji,true));activeItem={layer:marker,shop:s};
  document.getElementById('li-'+s.id)?.classList.add('active');
  document.getElementById('mc-'+s.id)?.classList.add('active');
  scrollCardIntoView(s.id);
  document.getElementById('popupImg').src=s.img;
  document.getElementById('popupName').innerHTML=s.name+vCheck(s.tags);
  document.getElementById('popupMeta').textContent=s.emoji+' '+s.cat+' · 📍 '+s.city;
  document.getElementById('popupRating').textContent='★ '+s.rating;
  document.getElementById('popupVisits').textContent=s.visits+' visits';
  document.getElementById('popupBadges').innerHTML=(s.tags.includes('verified')?'<span class="badge badge-verified">✓ Verified</span>':'')+(s.tags.includes('sponsored')?'<span class="badge badge-sponsored">★ Featured</span>':'')+(s.tags.includes('deal')?'<span class="badge badge-deal">Deal</span>':'')+(s.tags.includes('new')?'<span class="badge badge-new">New</span>':'');
  document.getElementById('popupLink').href=s.page;
  // Reset heart state
  var heart=document.querySelector('.popup-heart');if(heart){heart.classList.remove('saved');heart.textContent='♡';}
  document.getElementById('mapPopup').classList.add('show');
}
function closePopup(){
  document.getElementById('mapPopup').classList.remove('show');
  if(activeItem){
    activeItem.layer.setIcon(mkIcon(activeItem.shop.emoji,false));
    document.getElementById('li-'+activeItem.shop.id)?.classList.remove('active');
    document.getElementById('mc-'+activeItem.shop.id)?.classList.remove('active');
    activeItem=null;
  }
}
function setCat(el,cat){
  document.querySelectorAll('.filter-pill').forEach(p=>{if(p.id&&p.id.startsWith('tag-'))return;p.classList.remove('active');});
  el.classList.add('active');activeCat=cat;renderMarkers();
}
function toggleTag(tag){
  const el=document.getElementById('tag-'+tag);
  if(activeTags.has(tag)){activeTags.delete(tag);el.classList.remove('active');}
  else{activeTags.add(tag);el.classList.add('active');}
  renderMarkers();
}
map.on('click',()=>closePopup());

// City URL parameter support: ?city=Bangkok or ?city=Ho+Chi+Minh+City
(function(){
  var CITY_COORDS={
    'bangkok':[13.73,100.56],'pattaya':[12.93,100.88],'chiang mai':[18.79,98.98],
    'phuket':[7.88,98.39],'hua hin':[12.57,99.96],'khon kaen':[16.43,102.83],
    'ko samui':[9.51,100.06],'nakhon ratchasima':[14.97,102.1],'udon thani':[17.42,102.79],
    'ubon ratchathani':[15.25,104.85],'krabi':[8.09,98.91],'phitsanulok':[16.82,100.26],
    'ratchaburi':[13.54,99.81],'kanchanaburi':[14.02,99.53],'sri racha':[13.17,100.93],
    'rayong':[12.68,101.28],'nakhon sawan':[15.7,100.12],
    'ho chi minh city':[10.78,106.7],'hanoi':[21.03,105.85],
    'bali':[-8.65,115.22],'jakarta':[-6.2,106.85],'surabaya':[-7.29,112.75],'batam':[1.05,104.03],
    'phnom penh':[11.56,104.92],'singapore':[1.35,103.82],'kuala lumpur':[3.14,101.69]
  };
  var params=new URLSearchParams(window.location.search);
  var cityParam=params.get('city');
  if(cityParam){
    var cityLower=cityParam.toLowerCase();
    var coords=CITY_COORDS[cityLower];
    if(coords) map.setView(coords,13);
    document.getElementById('searchInput').value=cityParam;
  }
  renderMarkers();
})();
</script>
