<script>
const photoSets = {
  all: ["https://swanpass.com/wp-content/uploads/2023/05/main_image01-1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/lily4.jpg", "https://swanpass.com/wp-content/uploads/2023/05/minny4.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nadia9.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nam1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nana7.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nanny5.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nat7.jpg", "https://swanpass.com/wp-content/uploads/2023/05/orchid1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/pan2.jpg", "https://swanpass.com/wp-content/uploads/2023/05/perry1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/somo1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff01.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff02.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff03.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff04.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff05.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff06.jpg", "https://swanpass.com/wp-content/uploads/2023/05/susy4.jpg", "https://swanpass.com/wp-content/uploads/2023/05/tawan9.jpg", "https://swanpass.com/wp-content/uploads/2023/05/photomap.jpg", "https://swanpass.com/wp-content/uploads/2023/05/main_image01-1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu2022_normal3.jpg", "https://swanpass.com/wp-content/uploads/2023/05/main_image99.jpg", "https://swanpass.com/wp-content/uploads/2023/05/main_image106.jpg", "https://swanpass.com/wp-content/uploads/2023/05/main_image107.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu_may1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu_may2.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu_outside3.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu_tantra.jpg"],
  talent: ["https://swanpass.com/wp-content/uploads/2023/05/lily4.jpg", "https://swanpass.com/wp-content/uploads/2023/05/minny4.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nadia9.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nam1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nana7.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nanny5.jpg", "https://swanpass.com/wp-content/uploads/2023/05/nat7.jpg", "https://swanpass.com/wp-content/uploads/2023/05/orchid1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/pan2.jpg", "https://swanpass.com/wp-content/uploads/2023/05/perry1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/somo1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff01.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff02.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff03.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff04.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff05.jpg", "https://swanpass.com/wp-content/uploads/2023/05/staff06.jpg", "https://swanpass.com/wp-content/uploads/2023/05/susy4.jpg", "https://swanpass.com/wp-content/uploads/2023/05/tawan9.jpg"],
  shop: ["https://swanpass.com/wp-content/uploads/2023/05/main_image01-1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/photomap.jpg", "https://swanpass.com/wp-content/uploads/2023/05/main_image01-1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu2022_normal3.jpg", "https://swanpass.com/wp-content/uploads/2023/05/main_image99.jpg", "https://swanpass.com/wp-content/uploads/2023/05/main_image106.jpg", "https://swanpass.com/wp-content/uploads/2023/05/main_image107.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu_may1.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu_may2.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu_outside3.jpg", "https://swanpass.com/wp-content/uploads/2023/05/menu_tantra.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

(function() {
  let startX = 0;
  const img = document.getElementById('lightboxImg');
  img.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
  img.addEventListener('touchend', function(e) {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) navLightbox(diff > 0 ? -1 : 1);
  });
})();
</script>
