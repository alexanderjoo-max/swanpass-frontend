<script>
const photoSets = {
  all: ["https://swanpass.com/wp-content/uploads/2023/02/IMG_8961_JPG-640x427.webp", "https://swanpass.com/wp-content/uploads/2023/04/chiang-mai-model-club-massage-spa-15401.jpg", "https://swanpass.com/wp-content/uploads/2023/04/chiang-mai-model-club-massage-spa-15400.jpeg", "https://swanpass.com/wp-content/uploads/2023/04/53F4EE87-917F-4E1D-B1CB-E3E8A756FF1F-765x1024-1.jpg", "https://swanpass.com/wp-content/uploads/2023/03/hot-thai-lady-working-at-the-angel-massage-in-bangkok.jpg", "https://swanpass.com/wp-content/uploads/2023/03/128423425_719009195663734_7612052132729485107_n.jpg", "https://swanpass.com/wp-content/uploads/2023/03/Screenshot-2023-03-23-at-11.14.11-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/03/Screenshot-2023-03-23-at-11.14.00-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/02/121746.jpg", "https://swanpass.com/wp-content/uploads/2023/02/432ed7_e01d19a90c0948a688a3466b4f4b702a_mv2.webp", "https://swanpass.com/wp-content/uploads/2023/04/13.jpg", "https://swanpass.com/wp-content/uploads/2023/04/2.jpg", "https://swanpass.com/wp-content/uploads/2023/04/6.jpg", "https://swanpass.com/wp-content/uploads/2023/04/7.jpg", "https://swanpass.com/wp-content/uploads/2023/04/8.jpg", "https://swanpass.com/wp-content/uploads/2023/04/9.jpg"],
  talent: ["https://swanpass.com/wp-content/uploads/2023/04/chiang-mai-model-club-massage-spa-15401.jpg", "https://swanpass.com/wp-content/uploads/2023/04/chiang-mai-model-club-massage-spa-15400.jpeg", "https://swanpass.com/wp-content/uploads/2023/04/53F4EE87-917F-4E1D-B1CB-E3E8A756FF1F-765x1024-1.jpg", "https://swanpass.com/wp-content/uploads/2023/03/hot-thai-lady-working-at-the-angel-massage-in-bangkok.jpg", "https://swanpass.com/wp-content/uploads/2023/03/128423425_719009195663734_7612052132729485107_n.jpg", "https://swanpass.com/wp-content/uploads/2023/03/Screenshot-2023-03-23-at-11.14.11-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/03/Screenshot-2023-03-23-at-11.14.00-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/02/121746.jpg", "https://swanpass.com/wp-content/uploads/2023/02/432ed7_e01d19a90c0948a688a3466b4f4b702a_mv2.webp"],
  shop: ["https://swanpass.com/wp-content/uploads/2023/02/IMG_8961_JPG-640x427.webp", "https://swanpass.com/wp-content/uploads/2023/04/13.jpg", "https://swanpass.com/wp-content/uploads/2023/04/2.jpg", "https://swanpass.com/wp-content/uploads/2023/04/6.jpg", "https://swanpass.com/wp-content/uploads/2023/04/7.jpg", "https://swanpass.com/wp-content/uploads/2023/04/8.jpg", "https://swanpass.com/wp-content/uploads/2023/04/9.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

(function() {
  let startX = 0;
  const img = document.getElementById('lightboxImg');
  img.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
  img.addEventListener('touchend', function(e) {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) navLightbox(diff > 0 ? -1 : 1);
  });
})();
</script>
