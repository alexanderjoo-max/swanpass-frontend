<script>
const photoSets = {
  all: ["https://swanpass.com/wp-content/uploads/2023/02/329394227_214898314349760_6104782897208204512_n-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/305723506_511462620584447_3641760350538799238_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/328176314_1347649789370186_7565889956578852533_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/328585077_1256402698564033_6552802568070777184_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/329037661_173034398782134_2173980486203441118_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/329398503_1851845865172077_6877215953129708064_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/329751516_890901145441962_6213916701301094913_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/329768201_786220196194239_8727197712210214939_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330162964_3667741816779281_8577410214957128947_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330209244_709272190918203_6312122352655113392_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330364888_1206401066661310_4799208095352143926_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330757002_867966227620687_559196536682686426_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/club_area_czech_ekemai_bangkok.webp", "https://swanpass.com/wp-content/uploads/2023/02/cute_thai_girls_czech_club_bangkok.jpeg", "https://swanpass.com/wp-content/uploads/2023/02/318797735_5771335936258722_6916196551565230278_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/download-2.jpg", "https://swanpass.com/wp-content/uploads/2023/02/vip_room_czech_gentlemen_club_bangkok.jpeg", "https://swanpass.com/wp-content/uploads/2023/02/interior_czech_club_area_bangkok.jpeg", "https://swanpass.com/wp-content/uploads/2023/02/club_area_czech_ekemai_bangkok.webp", "https://swanpass.com/wp-content/uploads/2023/02/328710707_6174711199216987_1758067119838382322_n.jpg"],
  talent: ["https://swanpass.com/wp-content/uploads/2023/02/305723506_511462620584447_3641760350538799238_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/328176314_1347649789370186_7565889956578852533_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/328585077_1256402698564033_6552802568070777184_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/329037661_173034398782134_2173980486203441118_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/329398503_1851845865172077_6877215953129708064_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/329751516_890901145441962_6213916701301094913_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/329768201_786220196194239_8727197712210214939_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330162964_3667741816779281_8577410214957128947_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330209244_709272190918203_6312122352655113392_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330364888_1206401066661310_4799208095352143926_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/330757002_867966227620687_559196536682686426_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/club_area_czech_ekemai_bangkok.webp", "https://swanpass.com/wp-content/uploads/2023/02/cute_thai_girls_czech_club_bangkok.jpeg", "https://swanpass.com/wp-content/uploads/2023/02/318797735_5771335936258722_6916196551565230278_n.jpg"],
  shop: ["https://swanpass.com/wp-content/uploads/2023/02/329394227_214898314349760_6104782897208204512_n-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/download-2.jpg", "https://swanpass.com/wp-content/uploads/2023/02/vip_room_czech_gentlemen_club_bangkok.jpeg", "https://swanpass.com/wp-content/uploads/2023/02/interior_czech_club_area_bangkok.jpeg", "https://swanpass.com/wp-content/uploads/2023/02/club_area_czech_ekemai_bangkok.webp", "https://swanpass.com/wp-content/uploads/2023/02/328710707_6174711199216987_1758067119838382322_n.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

(function() {
  let startX = 0;
  const img = document.getElementById('lightboxImg');
  img.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
  img.addEventListener('touchend', function(e) {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) navLightbox(diff > 0 ? -1 : 1);
  });
})();
</script>
