<script>
const photoSets = {
  all: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/861/306827631_497975972333570_5811231044464597535_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/862/311770201_531641305633703_7022176834443079112_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/864/311780665_531641332300367_6880995157620810261_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/863/312157892_531641315633702_8483970294784468186_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/865/312238914_531641375633696_2943626257896069508_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/867/312608232_531649718966195_6987384344382110021_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/868/351122131_560865392901325_6892791397778124680_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/866/312326139_536381805159653_7426595117378110755_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/859/305407494_497975929000241_7428680937629516314_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/860/305973215_491143423016825_1026725416433466867_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/861/306827631_497975972333570_5811231044464597535_n.jpg"],
  talent: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/862/311770201_531641305633703_7022176834443079112_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/864/311780665_531641332300367_6880995157620810261_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/863/312157892_531641315633702_8483970294784468186_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/865/312238914_531641375633696_2943626257896069508_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/867/312608232_531649718966195_6987384344382110021_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/868/351122131_560865392901325_6892791397778124680_n.jpg"],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/861/306827631_497975972333570_5811231044464597535_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/866/312326139_536381805159653_7426595117378110755_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/859/305407494_497975929000241_7428680937629516314_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/860/305973215_491143423016825_1026725416433466867_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/861/306827631_497975972333570_5811231044464597535_n.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
