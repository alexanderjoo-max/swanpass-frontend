<header>
  <div class="header-inner">
    <a href="index.html"><img src="./swanpass_logo_rev.png" alt="Swanpass" class="logo-img"></a>
    <div class="header-search" onclick="window.location='search.html?q='+encodeURIComponent(this.querySelector('input').value)" style="cursor:pointer">
      <span style="color:var(--white40)">🔍</span>
      <input type="text" placeholder="Search shops, cities..." onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')window.location='search.html?q='+encodeURIComponent(this.value)">
    </div>
    <button class="btn-login" onclick="window.location='login.html'">Login</button>
  </div>
</header>
<nav class="nav-tabs">
  <div class="nav-tabs-inner">
    <a href="index.html" class="nav-tab">🏠 Home</a>
    <a href="map.html" class="nav-tab">🗺️ Map</a>
    <a href="deals.html" class="nav-tab">🏷️ Deals</a>
    <a href="listings.html" class="nav-tab">🔍 Browse</a>
    <a href="best-places.html" class="nav-tab">🏆 Best Places</a>
    <a href="cities.html" class="nav-tab">📍 Cities</a>
    <a href="search.html" class="nav-tab">🔎 Search</a>
    <a href="add-listing.html" class="nav-tab">➕ List Your Business</a>
    <a href="admin.html" class="nav-tab">⚙️ Admin</a>
  </div>
</nav>
<script>
(function(){
  var page = location.pathname.split('/').pop() || 'index.html';
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) {
    var href = tabs[i].getAttribute('href');
    if (href === page || (page === '' && href === 'index.html')) {
      tabs[i].classList.add('active');
    }
    // City pages → highlight Cities tab
    if (page.indexOf('city-') === 0 && href === 'cities.html') {
      tabs[i].classList.add('active');
    }
    // Listing pages → highlight Browse tab
    if (page.indexOf('listing-') === 0 && href === 'listings.html') {
      tabs[i].classList.add('active');
    }
  }
})();
</script>
