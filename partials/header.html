<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<header>
  <div class="header-inner">
    <button class="btn-hamburger" aria-label="Menu" onclick="var n=document.querySelector('.nav-tabs');n.classList.toggle('open');this.textContent=n.classList.contains('open')?'\u2715':'\u2630'">☰</button>
    <div class="header-logo-wrap"><a href="index.html"><img src="./swanpass_logo_rev.png" alt="Swanpass" class="logo-img"></a></div>
    <div class="header-nav">
      <a href="map.html">🗺️ Map</a>
      <a href="deals.html">🏷️ Deals</a>
      <a href="best-places.html">🏆 Best Places</a>
      <a href="cities.html">📍 Cities</a>      <a href="../talent.html">👩 Girls</a>
      <a href="search.html">🔎 Search</a>
      <a href="add-listing.html">➕ List Your Business</a>
    </div>
    <button class="btn-login" onclick="window.location='login.html'">Login</button>
  </div>
</header>
<nav class="nav-tabs">
  <div class="nav-tabs-inner">
    <a href="map.html" class="nav-tab">🗺️ Map</a>
    <a href="deals.html" class="nav-tab">🏷️ Deals</a>
    <a href="best-places.html" class="nav-tab">🏆 Best Places</a>
    <a href="cities.html" class="nav-tab">📍 Cities</a>
    <a href="../talent.html" class="nav-tab">👩 Girls</a>
    <a href="search.html" class="nav-tab">🔎 Search</a>
    <a href="add-listing.html" class="nav-tab">➕ List Your Business</a>
    <a href="admin.html" class="nav-tab">⚙️ Admin</a>
  </div>
</nav>
<script>
(function(){
  var page = location.pathname.split('/').pop() || 'index.html';
  // Highlight active nav-tab (mobile drawer)
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) {
    var href = tabs[i].getAttribute('href');
    if (href === page || (page === '' && href === 'index.html')) tabs[i].classList.add('active');
    if (page.indexOf('city-') === 0 && href === 'cities.html') tabs[i].classList.add('active');
    if (page.indexOf('listing-') === 0 && href === 'search.html') tabs[i].classList.add('active');
  }
  // Highlight active header-nav link (desktop)
  var hLinks = document.querySelectorAll('.header-nav a');
  for (var j = 0; j < hLinks.length; j++) {
    var h = hLinks[j].getAttribute('href');
    if (h === page || (page === '' && h === 'index.html')) hLinks[j].classList.add('active');
    if (page.indexOf('city-') === 0 && h === 'cities.html') hLinks[j].classList.add('active');
    if (page.indexOf('listing-') === 0 && h === 'search.html') hLinks[j].classList.add('active');
  }
  // Close mobile nav when a link is clicked
  var nav = document.querySelector('.nav-tabs');
  var btn = document.querySelector('.btn-hamburger');
  tabs.forEach(function(t){
    t.addEventListener('click', function(){
      nav.classList.remove('open');
      if(btn) btn.textContent = '\u2630';
    });
  });
})();
</script>
