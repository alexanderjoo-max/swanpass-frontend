<script>
const photoSets = {
  all: ["https://swanpass.com/wp-content/uploads/2023/02/Screenshot-2023-01-29-at-10.05.48-PM-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/ako.jpg", "https://swanpass.com/wp-content/uploads/2023/02/jeab.jpg", "https://swanpass.com/wp-content/uploads/2023/02/28614.jpg", "https://swanpass.com/wp-content/uploads/2023/02/29050.jpg", "https://swanpass.com/wp-content/uploads/2023/02/25480.jpg", "https://swanpass.com/wp-content/uploads/2023/02/26774.jpg", "https://swanpass.com/wp-content/uploads/2023/02/21413.jpg", "https://swanpass.com/wp-content/uploads/2023/01/Screenshot-2023-01-29-at-10.37.07-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/01/Screenshot-2023-01-29-at-10.37.18-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/01/Screenshot-2023-01-29-at-10.36.44-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/01/Screenshot-2023-01-29-at-10.36.40-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/02/44717705794_2d19b82660_b.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rooms04.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rooms01.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rooms02.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rooms03.jpg"],
  talent: ["https://swanpass.com/wp-content/uploads/2023/02/ako.jpg", "https://swanpass.com/wp-content/uploads/2023/02/jeab.jpg", "https://swanpass.com/wp-content/uploads/2023/02/28614.jpg", "https://swanpass.com/wp-content/uploads/2023/02/29050.jpg", "https://swanpass.com/wp-content/uploads/2023/02/25480.jpg", "https://swanpass.com/wp-content/uploads/2023/02/26774.jpg", "https://swanpass.com/wp-content/uploads/2023/02/21413.jpg", "https://swanpass.com/wp-content/uploads/2023/01/Screenshot-2023-01-29-at-10.37.07-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/01/Screenshot-2023-01-29-at-10.37.18-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/01/Screenshot-2023-01-29-at-10.36.44-PM.jpg", "https://swanpass.com/wp-content/uploads/2023/01/Screenshot-2023-01-29-at-10.36.40-PM.jpg"],
  shop: ["https://swanpass.com/wp-content/uploads/2023/02/Screenshot-2023-01-29-at-10.05.48-PM-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/44717705794_2d19b82660_b.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rooms04.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rooms01.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rooms02.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rooms03.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

(function() {
  let startX = 0;
  const img = document.getElementById('lightboxImg');
  img.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
  img.addEventListener('touchend', function(e) {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) navLightbox(diff > 0 ? -1 : 1);
  });
})();
</script>
