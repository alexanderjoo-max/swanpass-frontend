<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phuket — Swanpass Thailand</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--black2:#111111;--red:#e8142a;--white:#fff;--w70:rgba(255,255,255,.7);--w40:rgba(255,255,255,.4);--w10:rgba(255,255,255,.08);--gold:#d4a847;--border:rgba(255,255,255,.08);--r:10px;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
header{background:var(--black);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 14px;}
.header-inner{display:flex;align-items:center;gap:10px;height:52px;max-width:1200px;margin:0 auto;}
.logo img{height:26px;display:block;}
.back-btn{background:var(--w10);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--white);font-size:12px;}
.btn-login{background:var(--red);color:var(--white);border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;flex-shrink:0;}
.city-hero{position:relative;height:220px;overflow:hidden;background:linear-gradient(135deg,#0a1a2a,#0a2a3a);}
.city-hero img{width:100%;height:100%;object-fit:cover;filter:brightness(.4);}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,transparent 60%);}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:20px 16px;}
.city-big{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;line-height:1;margin-bottom:6px;}
.coming-soon{text-align:center;padding:60px 20px;}
.cs-icon{font-size:52px;margin-bottom:16px;}
.cs-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:10px;}
.cs-text{font-size:14px;color:var(--w70);line-height:1.6;margin-bottom:28px;max-width:380px;margin-left:auto;margin-right:auto;}
.btn-back{display:inline-block;background:var(--red);color:var(--white);border-radius:8px;padding:12px 28px;font-size:14px;font-weight:700;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--black2);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--w40);text-decoration:none;}
.bnav-item.active{color:var(--red);}
.bi{font-size:20px;}.bl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.bn-spacer{height:70px;}
@media(min-width:768px){.bottom-nav,.bn-spacer{display:none!important;}.city-hero{height:300px;}.city-big{font-size:58px;}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo"><img src="./swanpass_logo_rev.png" alt="Swanpass"></a>
    <div style="flex:1"></div>
    <a href="index.html" class="back-btn">← Thailand</a>
    <button class="btn-login" onclick="window.location='login.html'">Login</button>
  </div>
</header>
<div class="city-hero">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Patong_Beach_Phuket_Thailand.jpg/1280px-Patong_Beach_Phuket_Thailand.jpg" onerror="this.style.display='none'" alt="Phuket">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div style="font-size:26px;margin-bottom:4px">🏖️</div>
    <div class="city-big">PHUKET</div>
  </div>
</div>
<div class="coming-soon">
  <div class="cs-icon">🏖️</div>
  <div class="cs-title">PHUKET Coming Soon</div>
  <div class="cs-text">We're building out our Phuket directory. Be the first to list your business or get notified when we launch in this city.</div>
  <a href="index.html" class="btn-back">← Back to Thailand</a>
</div>
<div class="bn-spacer"></div>
<nav class="bottom-nav">
  <a href="index.html"    class="bnav-item"><span class="bi">🏠</span><span class="bl">Home</span></a>
  <a href="map.html"      class="bnav-item"><span class="bi">🗺️</span><span class="bl">Map</span></a>
  <a href="deals.html"    class="bnav-item"><span class="bi">🏷️</span><span class="bl">Deals</span></a>
  <a href="listings.html" class="bnav-item"><span class="bi">🔍</span><span class="bl">Browse</span></a>
  <a href="search.html"   class="bnav-item"><span class="bi">🔎</span><span class="bl">Search</span></a>
</nav>
</body>
</html>
