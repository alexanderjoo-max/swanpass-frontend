<script>
const photoSets = {
  all: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14217/the333.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14615/Suwon.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14215/666-class.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15250/WhatsApp_Image_2026-02-23_at_16.12.33.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14214/chairman-nuru.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14216/g2g-massage.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14639/S__6889528.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14212/amor888.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14985/staff03.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2272/chiang-mai-cavier-spa-19426.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2495/WP_20140808_002.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2463/919a2S__137134082.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2204/300597388_559245119234656_7981128207240529974_n.jpg"],
  talent: [],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14217/the333.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14615/Suwon.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14215/666-class.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/15250/WhatsApp_Image_2026-02-23_at_16.12.33.webp","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14214/chairman-nuru.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14216/g2g-massage.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14639/S__6889528.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14212/amor888.jpeg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/14985/staff03.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2272/chiang-mai-cavier-spa-19426.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2495/WP_20140808_002.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2463/919a2S__137134082.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/2204/300597388_559245119234656_7981128207240529974_n.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
