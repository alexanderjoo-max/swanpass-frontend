<script>
const photoSets = {
  all: ["https://swanpass.com/wp-content/uploads/2023/02/120908310_110837440786677_1043497215995795573_n-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120531761_110841774119577_3026203941378384184_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120532735_110843314119423_5481158959179101146_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120581289_110840704119684_3701539767130475536_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120599686_110842757452812_2544260906748584179_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120726742_110841214119633_6189733897758896872_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120862045_110841004119654_1040260679054841682_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120880192_110842260786195_4193177131366543343_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120898197_110841994119555_6213363451951957047_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120903656_110841430786278_7899659226267753546_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120906713_110843154119439_5058542945118579467_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120908310_110837440786677_1043497215995795573_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120928226_110837297453358_5801420396726568246_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rainbow_image1_150052474506.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120973392_110838040786617_2917055140213177511_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120562039_110837827453305_7783710529830012314_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120523267_110837927453295_4484659267091464135_n.jpg"],
  talent: ["https://swanpass.com/wp-content/uploads/2023/02/120531761_110841774119577_3026203941378384184_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120532735_110843314119423_5481158959179101146_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120581289_110840704119684_3701539767130475536_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120599686_110842757452812_2544260906748584179_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120726742_110841214119633_6189733897758896872_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120862045_110841004119654_1040260679054841682_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120880192_110842260786195_4193177131366543343_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120898197_110841994119555_6213363451951957047_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120903656_110841430786278_7899659226267753546_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120906713_110843154119439_5058542945118579467_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120908310_110837440786677_1043497215995795573_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120928226_110837297453358_5801420396726568246_n.jpg"],
  shop: ["https://swanpass.com/wp-content/uploads/2023/02/120908310_110837440786677_1043497215995795573_n-640x427.jpg", "https://swanpass.com/wp-content/uploads/2023/02/rainbow_image1_150052474506.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120973392_110838040786617_2917055140213177511_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120562039_110837827453305_7783710529830012314_n.jpg", "https://swanpass.com/wp-content/uploads/2023/02/120523267_110837927453295_4484659267091464135_n.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

(function() {
  let startX = 0;
  const img = document.getElementById('lightboxImg');
  img.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; });
  img.addEventListener('touchend', function(e) {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) navLightbox(diff > 0 ? -1 : 1);
  });
})();
</script>
