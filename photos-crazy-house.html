<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos — Crazy House — Swanpass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/site.css">
</head>
<body>

<div data-include="partials/header.html"></div>

<div class="photos-header">
  <a href="listing-crazy-house.html" class="photos-back">←</a>
  <div class="photos-title">Photos for Crazy House</div>
</div>

<div class="photos-tab-bar">
  <button class="photos-tab active" onclick="filterPhotos('all', this)">All<span class="photos-count">9</span></button>
  <button class="photos-tab" onclick="filterPhotos('talent', this)">Talents<span class="photos-count">8</span></button>
  <button class="photos-tab" onclick="filterPhotos('shop', this)">Interior/Exterior<span class="photos-count">1</span></button>
</div>

<div class="photos-grid" id="photosGrid">
  <div class="photo-thumb" data-cat="featured" onclick="openLightbox(0, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/217/best-gogo-bars-bangkok-nude.jpg" alt="Crazy House" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(1, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/210/11.jpg" alt="Crazy House" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(2, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/213/14.jpg" alt="Crazy House" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(3, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/212/13.jpg" alt="Crazy House" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(4, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/214/12.jpg" alt="Crazy House" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(5, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/211/333_506169295.jpg" alt="Crazy House" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(6, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/215/304398607_949112962695973_4413778692492061381_n.jpg" alt="Crazy House" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(7, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/216/cc-770x515.jpg" alt="Crazy House" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
      <div class="photo-thumb" data-cat="talent" onclick="openLightbox(8, this.parentNode)">
        <img src="https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/217/best-gogo-bars-bangkok-nude.jpg" alt="Crazy House" loading="lazy" onerror="this.parentNode.style.display='none'">
      </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">›</button>
</div>

<div data-include="partials/footer.html"></div>

<script src="js/include.js"></script>
<script>
const photoSets = {
  all: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/217/best-gogo-bars-bangkok-nude.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/210/11.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/213/14.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/212/13.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/214/12.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/211/333_506169295.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/215/304398607_949112962695973_4413778692492061381_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/216/cc-770x515.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/217/best-gogo-bars-bangkok-nude.jpg"],
  talent: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/210/11.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/213/14.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/212/13.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/214/12.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/211/333_506169295.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/215/304398607_949112962695973_4413778692492061381_n.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/216/cc-770x515.jpg","https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/217/best-gogo-bars-bangkok-nude.jpg"],
  shop: ["https://sgp1.vultrobjects.com/swanprod/uploads/photo/image/217/best-gogo-bars-bangkok-nude.jpg"]
};
let currentSet = 'all';
let lbIndex = 0;

function filterPhotos(cat, btn) {
  currentSet = cat;
  document.querySelectorAll('.photos-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-thumb').forEach(el => {
    if (cat === 'all') {
      el.style.display = '';
    } else if (cat === 'shop') {
      el.style.display = (el.dataset.cat === 'shop' || el.dataset.cat === 'featured') ? '' : 'none';
    } else {
      el.style.display = el.dataset.cat === cat ? '' : 'none';
    }
  });
}

function openLightbox(idx, grid) {
  // Build URL list from visible thumbs
  const visible = [...grid.querySelectorAll('.photo-thumb')].filter(t => t.style.display !== 'none');
  const url = visible[idx]?.querySelector('img')?.src;
  if (!url) return;
  // Find index in current set
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = urls.indexOf(url);
  if (lbIndex === -1) lbIndex = 0;
  showLightbox(urls, lbIndex);
}

function showLightbox(urls, idx) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  const counter = document.getElementById('lightboxCounter');
  img.src = urls[idx];
  counter.textContent = (idx + 1) + ' / ' + urls.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  const urls = photoSets[currentSet].length > 0 ? photoSets[currentSet] : photoSets.all;
  lbIndex = (lbIndex + dir + urls.length) % urls.length;
  document.getElementById('lightboxImg').src = urls[lbIndex];
  document.getElementById('lightboxCounter').textContent = (lbIndex + 1) + ' / ' + urls.length;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

// Touch swipe for mobile lightbox
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(diff) > 50) {
    navLightbox(diff > 0 ? -1 : 1);
  }
});

// Close lightbox on background click
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
</body>
</html>
